name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: lint-${{ runner.os }}-py312-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --extras dev

      - name: Ruff check
        run: poetry run ruff check src tests/test_champollion_api.py docs/source/conf.py

      - name: Ruff format check
        run: poetry run ruff format --check src tests/test_champollion_api.py docs/source/conf.py
