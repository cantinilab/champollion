name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  public-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: tests-${{ runner.os }}-py312-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --extras dev

      - name: Run public tests
        env:
          KEOPS_CACHE_FOLDER: /tmp/champollion-keops-cache
          MPLCONFIGDIR: /tmp/matplotlib
          NUMBA_CACHE_DIR: /tmp/numba
        run: poetry run pytest -p no:cacheprovider --cov=champollion --cov-report=xml --cov-report=term tests/test_champollion_api.py

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
